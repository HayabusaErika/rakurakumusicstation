name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      # 安装 Crow 所需的依赖库
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libboost-all-dev asio-dev

    - name: Download Crow
      # 从 GitHub 下载 Crow 的头文件到当前目录
      run: |
        wget https://github.com/CrowCpp/Crow/releases/download/v1.2.0/crow_all.h -O crow.h

    - name: Compile
      # 编译时需要链接 pthread 库，并且使用刚才下载的 crow.h
      # 注意：如果代码里写的是 #include <crow.h>，下载的文件名必须匹配
      run: g++ radioserver.cpp -o radioserver -lpthread
